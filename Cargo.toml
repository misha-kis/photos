[workspace]
resolver = "3"
members = ["app", "cv", "photo-library"]
exclude = ["models", "test_data", "runs"]

[workspace.dependencies]
anyhow = "1.0.100"
image = "0.25.8"
tracing-subscriber = { version = "0.3", default-features = false, features = ["env-filter", "fmt"] }
tokio = { version = "1.48.0", features = ["full"] }

